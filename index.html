<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studentský Kvíz - Registrace 🏆</title>
    <!-- Tailwind CSS přes CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            /* Povolíme scrollování a nastavíme minimální výšku */
            min-height: 100vh;
            display: flex;
            align-items: center; /* Vycentruje svisle, pokud je dost místa */
            justify-content: center;
            background: linear-gradient(135deg, rgb(109, 55, 146) 0%, rgb(99, 189, 221) 100%);
            background-attachment: fixed;
            /* Přidáme odsazení shora i zdola pro scrollování */
            padding: 40px 10px;
            box-sizing: border-box;
        }

        .container-card {
            background: white;
            width: 100%;
            max-width: 480px;
            padding: 35px 25px; /* Upravené odsazení pro mobily */
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
            position: relative;
            margin: auto; /* Pomůže s centrováním při scrollování */
        }

        @media (min-width: 640px) {
            .container-card {
                padding: 40px;
            }
        }

        header h1 {
            color: rgb(109, 55, 146);
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: #333;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            box-sizing: border-box;
            transition: all 0.2s ease;
            outline: none;
            background-color: #fff;
        }

        input:focus {
            border-color: rgb(109, 55, 146);
            background-color: #fcfaff;
        }

        .note {
            font-size: 11px;
            color: rgb(226, 151, 84);
            font-weight: 600;
            margin-top: 6px;
            line-height: 1.4;
        }

        button {
            width: 100%;
            padding: 16px;
            background: rgb(226, 151, 84);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 6px -1px rgba(226, 151, 84, 0.3);
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        button:hover {
            opacity: 0.95;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            transform: none;
        }

        #success-message {
            display: none;
            text-align: center;
            padding: 20px 0;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        #success-message h2 {
            color: rgb(109, 55, 146);
            font-size: 30px;
            font-weight: 800;
            margin-bottom: 15px;
        }

        .decor-icon {
            position: absolute;
            user-select: none;
            pointer-events: none;
            z-index: -1; /* Posuneme pod kartu, aby nepřekážely klikání na krajích */
            opacity: 0.8;
        }

        .rocket { top: -15px; right: -15px; font-size: 35px; transform: rotate(15deg); }
        .pencil { bottom: -15px; left: -15px; font-size: 30px; transform: rotate(-10deg); }

        /* Na velmi malých mobilech skryjeme dekorace, pokud by vadily */
        @media (max-width: 400px) {
            .decor-icon { display: none; }
        }
    </style>
</head>
<body>

    <div class="container-card">
        <div class="decor-icon rocket">🚀</div>
        <div class="decor-icon pencil">📝</div>

        <div id="registration-form">
            <header class="text-center">
                <h1>Studentský Kvíz 🥇</h1>
                <p class="subtitle">Zaregistruj svůj tým a ukaž, co v tobě je!</p>
            </header>

            <form id="quizForm">
                <div class="form-group">
                    <label>Název týmu</label>
                    <input type="text" id="teamName" name="teamName" placeholder="Např. Kvízoví Magnáti" required>
                </div>

                <div class="form-group">
                    <label>Počet členů (1-8)</label>
                    <input type="number" id="memberCount" name="memberCount" min="1" max="8" placeholder="Kolik vás bude?" required>
                </div>

                <div class="form-group">
                    <label>Jméno kapitána</label>
                    <input type="text" id="captainName" name="captainName" placeholder="Kontaktní osoba" required>
                </div>

                <div class="form-group">
                    <label>Email na kapitána</label>
                    <input type="text" id="captainContact" name="captainContact" placeholder="Email nebo telefon" required>
                    <p class="note">Po registraci vám přijde potvrzující email.</p>
                </div>

                <button type="submit" id="submitBtn">
                    <span>Odeslat přihlášku</span>
                    <span>🚀</span>
                </button>
            </form>
        </div>

        <div id="success-message">
            <h2>Máme vás! 🎉</h2>
            <p style="font-size: 18px; color: #444; font-weight: 500; line-height: 1.5;">
                Tým byl úspěšně zaregistrován!<br>Těšíme se na vás v aréně.
            </p>
            <div style="font-size: 50px; margin-top: 20px;">🏆</div>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzYetnfQur9vv6ri-VvxobASujGAErtFBYDrJ6tH9BtcwxoIH1TyFrZm988q20yDrgk/exec';

        const form = document.getElementById('quizForm');
        const submitBtn = document.getElementById('submitBtn');
        const formContainer = document.getElementById('registration-form');
        const successMessage = document.getElementById('success-message');

        form.addEventListener('submit', e => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.querySelector('span:first-child').innerText = 'Odesílám...';

            const formData = new FormData(form);
            fetch(scriptURL, { method: 'POST', body: formData })
            .then(response => {
                formContainer.style.display = 'none';
                successMessage.style.display = 'block';
                // Odrolujeme nahoru, aby byla vidět děkovačka, pokud byl form dlouhý
                window.scrollTo({ top: 0, behavior: 'smooth' });
            })
            .catch(error => {
                console.error('Chyba!', error.message);
                alert('Něco se nepovedlo. Zkuste to znovu.');
                submitBtn.disabled = false;
                submitBtn.querySelector('span:first-child').innerText = 'Zkusit znovu 🚀';
            });
        });
    </script>
</body>
</html>
