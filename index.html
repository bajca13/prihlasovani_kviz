<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studentský Kvíz - Registrace 🏆</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, rgb(109, 55, 146) 0%, rgb(99, 189, 221) 100%); background-attachment: fixed; padding: 40px 10px; margin:0; box-sizing: border-box; }
        .card { background: white; width: 100%; max-width: 480px; padding: 40px; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); position: relative; text-align: center; }
        h1 { color: rgb(109, 55, 146); font-size: 26px; font-weight: 800; margin-bottom: 8px; }
        label { display: block; font-size: 12px; font-weight: 700; color: #333; margin-bottom: 6px; text-transform: uppercase; text-align: left; }
        input { width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 15px; outline: none; margin-bottom: 20px; }
        input:focus { border-color: rgb(109, 55, 146); }
        .note { font-size: 11px; color: rgb(226, 151, 84); font-weight: 600; margin-top: -15px; margin-bottom: 20px; text-align: left; }
        button { width: 100%; padding: 16px; background: rgb(226, 151, 84); color: white; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; border: none; }
        button:disabled { background: #cbd5e1; cursor: not-allowed; }
        #success { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <div id="form-container">
            <header>
                <h1>Studentský Kvíz 🥇</h1>
                <p style="color: #666; font-size: 14px; margin-bottom: 30px;">Zaregistruj svůj tým!</p>
            </header>
            <form id="quizForm">
                <label>Název týmu</label>
                <input type="text" name="teamName" required>
                
                <label>Počet členů (1-8)</label>
                <input type="number" name="memberCount" min="1" max="8" required>
                
                <label>Jméno kapitána</label>
                <input type="text" name="captainName" required>
                
                <label>Email na kapitána</label>
                <input type="text" name="contact" required>
                <p class="note">Po registraci vám přijde potvrzující email.</p>
                
                <button type="submit" id="btn">Odeslat přihlášku 🚀</button>
            </form>
        </div>
        <div id="success">
            <h2 style="color: rgb(109, 55, 146); font-size: 32px; font-weight: 800;">Máme vás! 🎉</h2>
            <p style="font-size: 18px; margin-top: 10px;">Tým byl úspěšně zaregistrován.</p>
        </div>
    </div>

    <script>
        // VLOŽTE ADRESU Z NOVÉHO NASAZENÍ
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxI6vf0rTrvT_9f_fd_2XGPyRv6RO1qJMl2pGZw3edaK4Q17FCwHQtyQowx1SWw1v8S/exec';

        document.getElementById('quizForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btn');
            btn.disabled = true;
            btn.innerText = 'Odesílám...';

            // Převod na URL formát (nejspolehlivější pro Google)
            const formData = new FormData(this);
            const encodedData = new URLSearchParams(formData).toString();

            fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: encodedData
            }).then(() => {
                document.getElementById('form-container').style.display = 'none';
                document.getElementById('success').style.display = 'block';
            }).catch(() => {
                alert('Chyba! Zkuste to znovu.');
                btn.disabled = false;
                btn.innerText = 'Zkusit znovu 🚀';
            });
        });
    </script>
</body>
</html>
