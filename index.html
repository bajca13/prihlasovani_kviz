<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studentský Kvíz - Registrace 🏆</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; margin: 0; padding: 40px 10px; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, rgb(109, 55, 146) 0%, rgb(99, 189, 221) 100%); background-attachment: fixed; box-sizing: border-box; overflow-y: auto; }
        .container-card { background: white; width: 100%; max-width: 480px; padding: 35px 25px; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); position: relative; margin: auto; }
        @media (min-width: 640px) { .container-card { padding: 40px; } }
        header h1 { color: rgb(109, 55, 146); font-size: 26px; font-weight: 800; margin-bottom: 8px; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 25px; }
        .form-group { margin-bottom: 18px; text-align: left; }
        label { display: block; font-size: 12px; font-weight: 700; color: #333; margin-bottom: 6px; text-transform: uppercase; }
        input { width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 15px; outline: none; }
        input:focus { border-color: rgb(109, 55, 146); }
        .note { font-size: 11px; color: rgb(226, 151, 84); font-weight: 600; margin-top: 6px; }
        button { width: 100%; padding: 16px; background: rgb(226, 151, 84); color: white; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; }
        button:disabled { background: #cbd5e1; cursor: not-allowed; }
        #success-message { display: none; text-align: center; }
        .decor-icon { position: absolute; pointer-events: none; z-index: -1; opacity: 0.8; }
        .rocket { top: -15px; right: -15px; font-size: 35px; transform: rotate(15deg); }
        .pencil { bottom: -15px; left: -15px; font-size: 30px; transform: rotate(-10deg); }
    </style>
</head>
<body>
    <div class="container-card">
        <div class="decor-icon rocket">🚀</div>
        <div class="decor-icon pencil">📝</div>
        <div id="registration-form">
            <header class="text-center">
                <h1>Studentský Kvíz 🥇</h1>
                <p class="subtitle">Zaregistruj svůj tým a ukaž, co v tobě je!</p>
            </header>
            <form id="quizForm">
                <div class="form-group">
                    <label>Název týmu</label>
                    <input type="text" name="teamName" placeholder="Např. Kvízoví Magnáti" required>
                </div>
                <div class="form-group">
                    <label>Počet členů (1-8)</label>
                    <input type="number" name="memberCount" min="1" max="8" placeholder="Kolik vás bude?" required>
                </div>
                <div class="form-group">
                    <label>Jméno kapitána</label>
                    <input type="text" name="captainName" placeholder="Kontaktní osoba" required>
                </div>
                <div class="form-group">
                    <label>Email / Kontakt na kapitána</label>
                    <!-- Tady je důležité name="contact" -->
                    <input type="text" name="contact" placeholder="Email nebo telefon" required>
                    <p class="note">Po registraci vám přijde potvrzující email.</p>
                </div>
                <button type="submit" id="submitBtn">
                    <span>Odeslat přihlášku</span>
                    <span>🚀</span>
                </button>
            </form>
        </div>
        <div id="success-message">
            <h2 class="text-[30px] font-black text-[#6d3792] mb-4">Máme vás! 🎉</h2>
            <p class="text-[18px] text-[#444] font-medium leading-relaxed">Tým byl zaregistrován!<br>Těšíme se na vás v aréně.</p>
            <div style="font-size: 50px; margin-top: 20px;">🏆</div>
        </div>
    </div>

    <script>
        // SEM VLOŽTE TU NOVOU URL Z NASAZENÍ
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxSR5JfKinijRuZpRTyi0MLkn29xjmK0Q8LgbRc9R9oGvqtTwo3_S8c9aQwWrhKXtk/exec';

        const form = document.getElementById('quizForm');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', e => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.querySelector('span:first-child').innerText = 'Odesílám...';

            // Převod na form-data formát, který Google Script miluje přes e.parameter
            const formData = new FormData(form);
            const params = new URLSearchParams();
            for (const pair of formData) {
                params.append(pair[0], pair[1]);
            }

            fetch(scriptURL, { 
                method: 'POST', 
                mode: 'no-cors', // Důležité pro Google Script
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params.toString() 
            })
            .then(() => {
                document.getElementById('registration-form').style.display = 'none';
                document.getElementById('success-message').style.display = 'block';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            })
            .catch(error => {
                alert('Chyba odesílání. Zkuste to znovu.');
                submitBtn.disabled = false;
                submitBtn.querySelector('span:first-child').innerText = 'Zkusit znovu 🚀';
            });
        });
    </script>
</body>
</html>
