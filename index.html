<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studentský Kvíz 2024 - Registrace</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        'quiz-purple': 'rgb(109, 55, 146)',
                        'quiz-blue': 'rgb(99, 189, 221)',
                        'quiz-yellow': 'rgb(222, 221, 79)',
                        'quiz-orange': 'rgb(226, 151, 84)',
                    },
                }
            }
        }
    </script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .slide-in-left { animation: slideInLeft 0.5s ease-out forwards; }
        @keyframes slideInLeft { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

        .slide-in-right { animation: slideInRight 0.5s ease-out forwards; }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // VLOŽTE SVÉ URL Z GOOGLE APPS SCRIPTU
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxI6vf0rTrvT_9f_fd_2XGPyRv6RO1qJMl2pGZw3edaK4Q17FCwHQtyQowx1SWw1v8S/exec';
        function App() {
            const [formData, setFormData] = useState({
                teamName: '',
                memberCount: '',
                captainName: '',
                contact: '',
            });
            const [status, setStatus] = useState('idle');
            const [errorMessage, setErrorMessage] = useState('');

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [status]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setStatus('submitting');

                try {
                    const submitData = new URLSearchParams();
                    submitData.append('teamName', formData.teamName);
                    submitData.append('memberCount', formData.memberCount);
                    submitData.append('captainName', formData.captainName);
                    submitData.append('contact', formData.contact);

                    await fetch(scriptURL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: submitData.toString(),
                    });

                    setStatus('success');
                } catch (error) {
                    setStatus('error');
                    setErrorMessage('Něco se nepovedlo. Zkuste to znovu.');
                }
            };

            const handleChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-quiz-blue to-quiz-purple py-8 px-4 flex flex-col items-center justify-start lg:justify-center">
                    <div className="w-full max-w-6xl flex flex-col lg:flex-row gap-8 items-start justify-center relative z-10">
                        
                        {/* FORMULÁŘ */}
                        {status !== 'success' ? (
                            <div className="w-full lg:w-[500px] bg-white rounded-[32px] shadow-2xl p-8 sm:p-10 border border-white/20 slide-in-left">
                                <header className="text-center mb-10">
                                    <h1 className="text-[40px] sm:text-[52px] lg:text-[60px] font-black text-quiz-purple mb-4 tracking-tighter leading-[0.9]">
                                        Studentský Kvíz 2024 <span className="text-quiz-yellow inline-block animate-pulse">🏆</span>
                                    </h1>
                                    <p className="text-[15px] sm:text-[17px] text-gray-500 font-medium">
                                        Zaregistruj svůj tým!
                                    </p>
                                </header>

                                <form onSubmit={handleSubmit} className="space-y-6">
                                    <div>
                                        <label className="block text-[13px] font-bold text-gray-800 mb-2 uppercase tracking-widest">Název týmu</label>
                                        <input type="text" name="teamName" required placeholder="Např. Kvízoví Magnáti" value={formData.teamName} onChange={handleChange}
                                            class="w-full px-5 py-4 border-2 border-gray-50 rounded-2xl outline-none focus:border-quiz-purple bg-gray-50/50" />
                                    </div>
                                    <div>
                                        <label className="block text-[13px] font-bold text-gray-800 mb-2 uppercase tracking-widest">Počet členů (1-8)</label>
                                        <input type="number" name="memberCount" required min="1" max="8" value={formData.memberCount} onChange={handleChange}
                                            class="w-full px-5 py-4 border-2 border-gray-50 rounded-2xl outline-none focus:border-quiz-purple bg-gray-50/50" />
                                    </div>
                                    <div>
                                        <label className="block text-[13px] font-bold text-gray-800 mb-2 uppercase tracking-widest">Kapitán</label>
                                        <input type="text" name="captainName" required placeholder="Jméno kapitána" value={formData.captainName} onChange={handleChange}
                                            class="w-full px-5 py-4 border-2 border-gray-50 rounded-2xl outline-none focus:border-quiz-purple bg-gray-50/50" />
                                    </div>
                                    <div>
                                        <label className="block text-[13px] font-bold text-gray-800 mb-2 uppercase tracking-widest">Kontakt</label>
                                        <input type="text" name="contact" required placeholder="Email nebo telefon" value={formData.contact} onChange={handleChange}
                                            class="w-full px-5 py-4 border-2 border-gray-50 rounded-2xl outline-none focus:border-quiz-purple bg-gray-50/50" />
                                    </div>

                                    <button type="submit" disabled={status === 'submitting'}
                                        className={`w-full p-5 rounded-2xl font-black text-white text-lg transition-all shadow-xl flex items-center justify-center gap-3 uppercase ${status === 'submitting' ? 'bg-gray-400' : 'bg-quiz-orange hover:scale-105 active:scale-95'}`}>
                                        {status === 'submitting' ? 'Odesílám...' : 'Zaregistrovat se'}
                                    </button>
                                </form>
                            </div>
                        ) : (
                            <div className="w-full lg:w-[500px] bg-white rounded-[32px] p-12 shadow-2xl text-center space-y-8 fade-in">
                                <h2 className="text-[48px] font-black text-quiz-purple mb-4">Máme vás! 🎉</h2>
                                <div className="bg-quiz-blue/10 p-8 rounded-[24px] border-2 border-quiz-blue/20">
                                    <p className="text-[22px] text-quiz-purple font-bold">Jste úspěšně zaregistrováni!<br>Brzy vám přijde email s potvrzením účasti a informacemi o průběhu kvízu.</p>
                                </div>
                                <button onClick={() => setStatus('idle')} className="px-10 py-4 bg-quiz-purple text-white rounded-2xl font-black uppercase">Zpět</button>
                            </div>
                        )}

                        {/* INFO BOX */}
                        <div className="w-full lg:flex-1 bg-white/95 backdrop-blur-md rounded-[32px] shadow-2xl p-8 sm:p-10 slide-in-right">
                            <h2 className="text-[32px] font-black text-quiz-purple mb-8">Co potřebuješ vědět?</h2>
                            <div className="space-y-6">
                                <div className="flex gap-4 p-4 bg-gray-50 rounded-2xl">
                                    <div className="text-2xl">📅</div>
                                    <div>
                                        <h3 className="font-black text-xs uppercase tracking-widest text-gray-900">Datum konání</h3>
                                        <p className="text-gray-600 font-medium whitespace-pre-line">4. května 2026</p>
                                    </div>
                                </div>
                                <div className="flex gap-4 p-4 bg-gray-50 rounded-2xl">
                                    <div className="text-2xl">📍</div>
                                    <div>
                                        <h3 className="font-black text-xs uppercase tracking-widest text-gray-900">Místo</h3>
                                        <p className="text-gray-600 font-medium whitespace-pre-line">Studentský klub kampa (Studentská 1824/29, České Budějovice 2, 370 05 České Budějovice)</p>
                                    </div>
                                </div>
                                <div className="flex gap-4 p-4 bg-gray-50 rounded-2xl">
                                    <div className="text-2xl">ℹ️</div>
                                    <div>
                                        <h3 className="font-black text-xs uppercase tracking-widest text-gray-900">Informace</h3>
                                        <p className="text-gray-600 font-medium whitespace-pre-line">Kvíz bude probíhat v 5 kolech, bude obsahovat 10 témat (2 na kolo).<br/> Kvíz by měl trvat cca 3 hodinky.<br/>Cena pro první tři týmy.</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
