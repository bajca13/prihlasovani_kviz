<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studentský Kvíz - Registrace 🏆</title>
    <!-- Tailwind CSS přes CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Outfit (Nejbližší bezplatná alternativa k písmu Daytona) -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Gradient z fialové do modré */
            background: linear-gradient(135deg, rgb(109, 55, 146) 0%, rgb(99, 189, 221) 100%);
            background-attachment: fixed;
            padding: 50px 15px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .container-card {
            background: white;
            width: 100%;
            max-width: 500px; /* Mírně rozšířeno pro velký nadpis */
            padding: 45px 25px;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            position: relative;
            margin: auto;
            text-align: center;
        }

        @media (min-width: 640px) {
            .container-card { padding: 55px 50px; }
        }

        /* Zvětšený nadpis */
        header h1 {
            color: rgb(109, 55, 146);
            font-size: 42px; /* Dříve 30px */
            font-weight: 900;
            margin-bottom: 12px;
            letter-spacing: -0.04em;
            line-height: 1.1;
        }

        @media (max-width: 480px) {
            header h1 { font-size: 34px; }
        }

        .subtitle {
            color: #666;
            font-size: 16px;
            margin-bottom: 40px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        input {
            width: 100%;
            padding: 15px 18px;
            border: 2px solid #f1f5f9;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.25s ease;
            outline: none;
            background-color: #fafafa;
        }

        input:focus {
            border-color: rgb(109, 55, 146);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(109, 55, 146, 0.1);
        }

        .note {
            font-size: 12px;
            color: rgb(226, 151, 84);
            font-weight: 600;
            margin-top: 8px;
            line-height: 1.4;
        }

        button {
            width: 100%;
            padding: 18px;
            background: rgb(226, 151, 84);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 10px 15px -3px rgba(226, 151, 84, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 20px;
            text-transform: uppercase;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 25px -5px rgba(226, 151, 84, 0.5);
            filter: brightness(1.05);
        }

        button:disabled {
            background: #e2e8f0;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #success-message {
            display: none;
            padding: 20px 0;
            animation: popIn 0.6s cubic-bezier(0.26, 0.53, 0.74, 1.48);
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.85); }
            100% { opacity: 1; transform: scale(1); }
        }

        .decor-icon {
            position: absolute;
            user-select: none;
            pointer-events: none;
            z-index: 10;
        }

        .rocket { top: -30px; right: -30px; font-size: 55px; transform: rotate(15deg); filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1)); }
        .pencil { bottom: -25px; left: -25px; font-size: 45px; transform: rotate(-10deg); filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1)); }

        @media (max-width: 480px) {
            .rocket { font-size: 40px; top: -20px; right: -20px; }
            .pencil { font-size: 35px; bottom: -20px; left: -20px; }
        }

        .spinner {
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        .submitting .spinner { display: block; }
        .submitting .btn-icon { display: none; }
    </style>
</head>
<body>

    <div class="container-card">
        <div class="decor-icon rocket">🚀</div>
        <div class="decor-icon pencil">📝</div>

        <div id="registration-form">
            <header>
                <h1>Studentský Kvíz <span style="color: rgb(222, 221, 79);">🏆</span></h1>
                <p class="subtitle">Zaregistruj svůj tým a ukaž, co v tobě je!</p>
            </header>

            <form id="quizForm">
                <div class="form-group">
                    <label>Název týmu</label>
                    <input type="text" name="teamName" placeholder="Zadej název týmu" required>
                </div>

                <div class="form-group">
                    <label style="border-bottom: 3px solid rgb(226, 151, 84); display: inline-block;">Počet členů (1-8)</label>
                    <input type="number" name="memberCount" min="1" max="8" placeholder="Kolik vás bude?" required>
                </div>

                <div class="form-group">
                    <label>Jméno kapitána</label>
                    <input type="text" name="captainName" placeholder="Kdo tým povede?" required>
                </div>

                <div class="form-group">
                    <label>Kontakt na kapitána</label>
                    <input type="text" name="contact" placeholder="Email nebo telefon" required>
                    <p class="note">Po registraci vám přijde potvrzující email.</p>
                </div>

                <button type="submit" id="submitBtn">
                    <div class="spinner"></div>
                    <span class="btn-text">Zaregistrovat tým</span>
                    <span class="btn-icon">🚀</span>
                </button>
            </form>
        </div>

        <div id="success-message">
            <h2 style="color: rgb(109, 55, 146); font-size: 38px; font-weight: 900; margin-bottom: 25px;">Máme vás! 🎉</h2>
            <div style="background: #f8fafc; padding: 35px; border-radius: 28px; border: 1px solid #f1f5f9;">
                <p style="font-size: 20px; color: #1e293b; font-weight: 700; line-height: 1.6; margin: 0;">
                    Jste úspěšně zaregistrováni!<br>Brzy vám přijde email s potvrzením účasti a informacemi o průběhu kvízu.

                </p>
            </div>
            <div style="font-size: 75px; margin-top: 40px; filter: drop-shadow(0 20px 20px rgba(0,0,0,0.15));">🏆</div>
        </div>
    </div>

    <script>
        // VAŠE URL ADRESA SKRIPTU
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxI6vf0rTrvT_9f_fd_2XGPyRv6RO1qJMl2pGZw3edaK4Q17FCwHQtyQowx1SWw1v8S/exec';

        const form = document.getElementById('quizForm');
        const submitBtn = document.getElementById('submitBtn');
        const formContainer = document.getElementById('registration-form');
        const successMessage = document.getElementById('success-message');

        form.addEventListener('submit', e => {
            e.preventDefault();
            
            submitBtn.disabled = true;
            submitBtn.classList.add('submitting');
            submitBtn.querySelector('.btn-text').innerText = 'Odesílám...';

            const formData = new FormData(form);
            const encodedData = new URLSearchParams(formData).toString();

            fetch(scriptURL, { 
                method: 'POST', 
                mode: 'no-cors', 
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: encodedData 
            })
            .then(() => {
                formContainer.style.display = 'none';
                successMessage.style.display = 'block';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            })
            .catch(error => {
                alert('Něco se nepovedlo. Zkuste to prosím znovu.');
                submitBtn.disabled = false;
                submitBtn.classList.remove('submitting');
                submitBtn.querySelector('.btn-text').innerText = 'Zaregistrovat tým';
            });
        });
    </script>
</body>
</html>
